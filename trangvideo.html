<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Watching - XNHAU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { --primary: #ff8866; --bg: #0c0d12; --surface: #14161f; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; user-select: none; }
        
        .header-nav { padding: 20px 40px; }
        .back-link { color: #888; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-link:hover { color: var(--primary); transform: translateX(-5px); }

        /* Bố cục chính: Video bên trái, Trending bên phải */
        .main-layout { 
            display: flex; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 0 20px; 
            gap: 25px; 
        }

        /* Vùng Video (70%) */
        .video-area { flex: 7; min-width: 0; }
        h1 { font-size: 22px; margin: 15px 0 5px 0; border-left: 4px solid var(--primary); padding-left: 15px; }
        .view-info { color: #888; font-size: 13px; margin: 0 0 15px 15px; }
        .video-wrapper { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; }

        /* Cột Trending bên phải (30%) */
        .sidebar-area { flex: 3; min-width: 300px; }
        .sidebar-title { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .sidebar-list { display: flex; flex-direction: column; gap: 12px; }
        
        /* Card nhỏ cho sidebar */
        .side-card { display: flex; gap: 10px; background: var(--surface); border-radius: 8px; padding: 8px; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .side-card:hover { border-color: var(--primary); background: #1e2130; }
        .side-card img { width: 120px; height: 70px; object-fit: cover; border-radius: 4px; }
        .side-info { flex: 1; min-width: 0; }
        .side-info p { margin: 0; font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .side-info span { font-size: 11px; color: #666; display: block; margin-top: 5px; }

        /* Vùng liên quan phía dưới */
        .bottom-section { max-width: 1300px; margin: 40px auto; padding: 0 20px; border-top: 1px solid #222; pt-30px; }
        .section-title { font-size: 18px; margin: 30px 0 20px 0; color: var(--primary); font-weight: bold; }
        .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        
        .rel-card { background: var(--surface); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .rel-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .rel-card img { width: 100%; height: 130px; object-fit: cover; }
        .rel-card p { padding: 10px; margin: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Mobile */
        @media (max-width: 1000px) {
            .main-layout { flex-direction: column; }
            .sidebar-area { width: 100%; }
            .related-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .plyr { --plyr-color-main: var(--primary); border-radius: 12px; }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="/" class="back-link">← QUAY LẠI TRANG CHỦ</a>
    </div>

    <div class="main-layout">
        <!-- BÊN TRÁI: VIDEO CHÍNH -->
        <div class="video-area">
            <h1 id="movie-title">Đang kết nối...</h1>
            <div class="view-info">👁️ <span id="main-view-count">...</span> lượt xem</div>
            <div class="video-wrapper">
                <video id="player" playsinline controls crossorigin="anonymous"></video>
            </div>
        </div>

        <!-- BÊN PHẢI: TOP TRENDING -->
        <div class="sidebar-area">
            <div class="sidebar-title">🔥 XEM NHIỀU NHẤT</div>
            <div id="trending-sidebar" class="sidebar-list">
                <!-- Data từ API top-trending sẽ vào đây -->
            </div>
        </div>
    </div>

    <!-- PHÍA DƯỚI: CÙNG QUỐC GIA -->
    <div class="bottom-section">
        <div class="section-title">CÓ THỂ BẠN CŨNG THÍCH (CÙNG QUỐC GIA)</div>
        <div class="related-grid" id="related-grid"></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player', { autoplay: false });
        const countriesArr = ["Việt Nam", "Korean", "Trung Quốc", "Âu/Mỹ", "Nhật Bản"];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const idVd = params.get('id');
            if (!idVd) return;

            try {
                const res = await fetch(`/api/get-link/${idVd}`);
                const data = await res.json();

                if (data.link_goc) {
                    document.getElementById('movie-title').innerText = data.title;
                    document.getElementById('main-view-count').innerText = data.views.toLocaleString();
                    
                    let poster = data.image || '';
                    if (poster && !poster.includes('catbox.moe')) {
                        poster = `/proxy-img?url=${encodeURIComponent(poster)}`;
                    }

                    player.source = {
                        type: 'video',
                        sources: [{ src: `/proxy?url=${encodeURIComponent(data.link_goc)}`, type: 'video/mp4' }],
                        poster: poster
                    };

                    // Gọi 2 danh sách riêng biệt
                    loadRelated(data.tags, idVd); // Phía dưới
                    loadTrendingSide();           // Cột bên phải
                }
            } catch (err) { console.error(err); }
        }

        // 1. Tải video cùng quốc gia (Phía dưới)
        async function loadRelated(currentTags, currentId) {
            try {
                const res = await fetch('/api/videos');
                const allVideos = await res.json();
                const currentCountry = currentTags.find(t => countriesArr.includes(t)) || "";
                
                const related = allVideos.filter(v => 
                    v.id_vd.toString() !== currentId.toString() && 
                    v.hag_tag && v.hag_tag.includes(currentCountry)
                ).slice(0, 8);

                const grid = document.getElementById('related-grid');
                grid.innerHTML = related.map(v => {
                    let img = v.image_vd;
                    if (img && !img.includes('catbox.moe')) img = `/proxy-img?url=${encodeURIComponent(img)}`;
                    return `
                        <div class="rel-card" onclick="location.href='/video?id=${v.id_vd}'">
                            <img src="${img}" onerror="this.src='https://placehold.co/300x180?text=XNHAU'">
                            <p>${v.title}</p>
                        </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        // 2. Tải video Hot nhất (Cột bên phải)[cite: 3]
        async function loadTrendingSide() {
            try {
                const res = await fetch('/api/top-trending');
                const topVideos = await res.json();
                
                const sidebar = document.getElementById('trending-sidebar');
                sidebar.innerHTML = topVideos.map(v => {
                    let img = v.image_vd;
                    if (img && !img.includes('catbox.moe')) img = `/proxy-img?url=${encodeURIComponent(img)}`;
                    return `
                        <div class="side-card" onclick="location.href='/video?id=${v.id_vd}'">
                            <img src="${img}">
                            <div class="side-info">
                                <p>${v.title}</p>
                                <span>👁️ ${v.views.toLocaleString()}</span>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
