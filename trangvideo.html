<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Watching - XNHAU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { --primary: #ff8866; --bg: #0c0d12; --surface: #14161f; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; user-select: none; }
        
        /* Navigation */
        .header-nav { width: 100%; padding: 20px 40px; box-sizing: border-box; }
        .back-link { color: #888; text-decoration: none; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-link:hover { color: var(--primary); transform: translateX(-5px); }

        /* Video Container */
        .container { width: 95%; max-width: 850px; margin: 10px auto; }
        h1 { font-size: 20px; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 15px; }
        .video-wrapper { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* Related Videos */
        .related-section { width: 95%; max-width: 850px; margin-top: 40px; padding-bottom: 50px; }
        .related-title { font-size: 18px; margin-bottom: 20px; color: var(--primary); font-weight: bold; }
        .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        .rel-card { background: var(--surface); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .rel-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .rel-card img { width: 100%; height: 110px; object-fit: cover; }
        .rel-card p { padding: 8px; margin: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 768px) {
            .container, .related-section { max-width: 100%; }
            .related-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Plyr Custom Color */
        .plyr { --plyr-color-main: var(--primary); border-radius: 12px; }
    </style>

    <script>
        /* ANTI-DEBUG (Đã làm gọn để tránh treo script load dữ liệu) */
        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
            }
        });
    </script>
</head>
<body>

    <div class="header-nav">
        <a href="/" class="back-link">← QUAY LẠI TRANG CHỦ</a>
    </div>

    <div class="container">
        <h1 id="movie-title">Đang kết nối server...</h1>
        <div class="video-wrapper">
            <video id="player" playsinline controls crossorigin="anonymous"></video>
        </div>
    </div>

    <div class="related-section">
        <div class="related-title">CÓ THỂ BẠN CŨNG THÍCH</div>
        <div class="related-grid" id="related-grid"></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const player = new Plyr('#player', { autoplay: false });
        const countriesArr = ["Việt Nam", "Korean", "Trung Quốc", "Âu/Mỹ", "Nhật Bản"];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const idVd = params.get('id');
            if (!idVd) {
                document.getElementById('movie-title').innerText = "Không tìm thấy video!";
                return;
            }

            try {
                // Gọi API lấy link video (Sử dụng đường dẫn tương đối /api/...)
                const res = await fetch(`/api/get-link/${idVd}`);
                if (!res.ok) throw new Error("Server error");
                const data = await res.json();

                if (data.link_goc) {
                    document.getElementById('movie-title').innerText = data.title;
                    
                    // Xử lý Poster qua proxy nếu cần
                    let poster = data.image || '';
                    if (poster && !poster.includes('catbox.moe')) {
                        poster = `/proxy-img?url=${encodeURIComponent(poster)}`;
                    }

                    // Thiết lập nguồn video qua Proxy Backend
                    player.source = {
                        type: 'video',
                        sources: [{ 
                            src: `/proxy?url=${encodeURIComponent(data.link_goc)}`, 
                            type: 'video/mp4' 
                        }],
                        poster: poster
                    };

                    // Tải video liên quan
                    loadRelated(data.tags, idVd);
                } else {
                    document.getElementById('movie-title').innerText = "Video không tồn tại!";
                }
            } catch (err) { 
                console.error("Lỗi tải video:", err);
                document.getElementById('movie-title').innerText = "Lỗi kết nối máy chủ!";
            }
        }

        async function loadRelated(currentTags, currentId) {
            try {
                const res = await fetch('/api/videos');
                const allVideos = await res.json();
                
                // Tìm quốc gia để lọc phim liên quan
                const currentCountry = currentTags.find(t => countriesArr.includes(t)) || "";
                
                const related = allVideos.filter(v => 
                    v.id_vd.toString() !== currentId.toString() && 
                    v.hag_tag && v.hag_tag.includes(currentCountry)
                ).slice(0, 6);

                const grid = document.getElementById('related-grid');
                if (related.length === 0) {
                    grid.innerHTML = "<p>Không có video liên quan.</p>";
                    return;
                }

                grid.innerHTML = related.map(v => {
                    let img = v.image_vd;
                    if (img && !img.includes('catbox.moe')) {
                        img = `/proxy-img?url=${encodeURIComponent(img)}`;
                    }
                    return `
                        <div class="rel-card" onclick="location.href='/video?id=${v.id_vd}'">
                            <img src="${img}" onerror="this.src='https://placehold.co/300x180?text=XNHAU'">
                            <p>${v.title}</p>
                        </div>
                    `;
                }).join('');
            } catch (e) { 
                console.error("Lỗi tải video liên quan:", e); 
            }
        }

        window.onload = init;
    </script>
</body>
</html>
