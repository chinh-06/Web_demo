<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>XNHAU - Xem Phim Hay</title>
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0c0d12; --card: #14161f; --primary: #ff8866; --text: #f1f1f1; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; }
        
        /* --- HEADER MỚI (Logo + Search + Lọc Quốc Gia) --- */
        header { position: sticky; top: 0; z-index: 100; background: rgba(12, 13, 18, 0.95); backdrop-filter: blur(10px); padding: 15px 40px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--primary); font-size: 30px; margin: 0; letter-spacing: 4px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        h1:hover { opacity: 0.8; }

        .header-right { display: flex; gap: 15px; align-items: center; }
        
        /* Thanh tìm kiếm */
        .search-wrapper { position: relative; }
        #search-input { width: 250px; padding: 10px 20px; border-radius: 20px; border: 1px solid #333; background: #1c1f2b; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        #search-input:focus { border-color: var(--primary); width: 300px; box-shadow: 0 0 15px rgba(255, 136, 102, 0.1); background: #2a2d3e; }
        #search-input::placeholder { color: #888; }

        /* Lọc quốc gia (Vẫn giữ dropdown cho gọn header) */
        .filter-group { position: relative; }
        .filter-btn { background: #1c1f2b; color: #fff; padding: 10px 20px; border-radius: 20px; cursor: pointer; border: 1px solid #333; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--primary); color: var(--primary); background: #1e2130; }

        .tag-list {
            display: none; position: absolute; top: 45px; right: 0;
            background: #14161f; border: 1px solid #333; border-radius: 8px;
            padding: 15px; width: max-content; max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .tag-list.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .cat-item { background: #2a2d3e; color: #aaa; font-size: 12px; padding: 6px 15px; border-radius: 15px; cursor: pointer; transition: 0.2s; border: 1px solid #444; }
        .cat-item:hover, .cat-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* --- SLIDER THỂ LOẠI (GIAO DIỆN MỚI) --- */
        .genre-section { max-width: 1300px; margin: 30px auto 10px; padding: 0 20px; }
        .genre-section h2 { font-size: 18px; color: var(--primary); margin: 0 0 15px 0; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        .genre-slider { 
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; 
            scroll-behavior: smooth;
            /* Ẩn thanh cuộn mặc định cho đẹp */
            scrollbar-width: none; /* Firefox */
        }
        .genre-slider::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

        .genre-card {
            flex: 0 0 auto; /* Không cho phép thẻ bị bóp méo */
            min-width: 140px; height: 65px;
            background: linear-gradient(145deg, #1c1f2b, #14161f);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: bold; color: #aaa;
            cursor: pointer; border: 1px solid #222; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .genre-card:hover { transform: translateY(-3px); color: #fff; border-color: #555; }
        .genre-card.active { border-color: var(--primary); color: #fff; background: linear-gradient(145deg, rgba(255,136,102,0.2), #14161f); box-shadow: 0 5px 15px rgba(255, 136, 102, 0.15); }

        /* --- LAYOUT CHÍNH (Chia cột) --- */
        .main-container { display: flex; max-width: 1300px; margin: 20px auto 40px; padding: 0 20px; gap: 30px; }
        
        /* Cột bên trái: Danh sách phim */
        .content-area { flex: 7.5; min-width: 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.4s; border: 1px solid #222; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(255, 136, 102, 0.15); }
        .card img { width: 100%; height: 190px; object-fit: cover; background: #222; display: block; }
        .card-info { padding: 15px; }
        .card-info h3 { margin: 0; font-size: 15px; color: #fff; height: 44px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }

        /* Cột bên phải: Trending */
        .sidebar-area { flex: 2.5; min-width: 280px; }
        .sidebar-title { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .sidebar-list { display: flex; flex-direction: column; gap: 15px; }
        
        .side-card { display: flex; gap: 10px; background: var(--card); border-radius: 8px; padding: 8px; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .side-card:hover { border-color: var(--primary); background: #1e2130; transform: translateX(5px); }
        .side-card img { width: 100px; height: 65px; object-fit: cover; border-radius: 4px; }
        .side-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .side-info p { margin: 0; font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }
        .side-info span { font-size: 11px; color: #888; margin-top: 5px; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .page-btn { background: #1c1f2b; color: #aaa; border: 1px solid #333; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .page-btn:hover { background: #2a2d3e; color: #fff; }
        .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Responsive */
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 900px) { 
            header { flex-direction: column; gap: 15px; }
            .header-right { width: 100%; justify-content: space-between; }
            #search-input { width: 100%; }
            #search-input:focus { width: 100%; }
            .main-container { flex-direction: column; } 
            .sidebar-area { width: 100%; margin-top: 20px; } 
        }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1 onclick="resetHome()">XNHAU</h1>
        
        <div class="header-right">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="🔍 Nhập tên phim..." oninput="searchVideo()">
            </div>

            <div class="filter-group">
                <div id="label-country" class="filter-btn" onclick="toggleDropdown('country-list')">Quốc gia ▼</div>
                <div class="tag-list" id="country-list"></div>
            </div>
        </div>
    </header>

    <div class="genre-section">
        <h2>THỂ LOẠI</h2>
        <div class="genre-slider" id="genre-slider">
            <div class="genre-card active" id="btn-all-genre" onclick="filterByTag('all', this)">Tất cả</div>
            </div>
    </div>

    <div class="main-container">
        <div class="content-area">
            <div class="grid" id="video-grid"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div class="sidebar-area">
            <div class="sidebar-title">🔥 XEM NHIỀU NHẤT</div>
            <div id="trending-sidebar" class="sidebar-list"></div>
        </div>
    </div>

    <script>
        let allVideos = []; 
        let currentFilteredVideos = [];
        let currentPage = 1;
        const vPerPage = 12; // Tăng lên 12 phim 1 trang cho đẹp
        const countriesArr = ["Việt Nam", "Korean", "Trung Quốc", "Âu/Mỹ", "Nhật Bản"];

        function resetHome() {
            localStorage.clear();
            window.location.href = '/';
        }

        function toggleDropdown(id) {
            document.querySelectorAll('.tag-list').forEach(l => { if(l.id !== id) l.classList.remove('show'); });
            document.getElementById(id).classList.toggle('show');
        }

        // --- TÌM KIẾM ---
        function searchVideo() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            
            // Bỏ chọn tất cả filter
            document.querySelectorAll('.genre-card, .cat-item').forEach(i => i.classList.remove('active'));
            document.getElementById('label-country').classList.remove('active');
            
            currentPage = 1;
            localStorage.setItem('savedPage', 1);

            if (keyword === "") {
                document.getElementById('btn-all-genre').classList.add('active');
                currentFilteredVideos = allVideos;
            } else {
                currentFilteredVideos = allVideos.filter(v => v.title && v.title.toLowerCase().includes(keyword));
            }
            renderGrid();
        }

        // --- TRENDING ---
        async function loadTrending() {
            try {
                const res = await fetch('/api/top-trending');
                const topVideos = await res.json();
                const sidebar = document.getElementById('trending-sidebar');
                
                sidebar.innerHTML = topVideos.map(v => {
                    let img = v.image_vd;
                    if (img && !img.includes('catbox.moe')) img = `/proxy-img?url=${encodeURIComponent(img)}`;
                    return `
                        <div class="side-card" onclick="location.href='/video?id=${v.id_vd}'">
                            <img src="${img}" onerror="this.src='https://placehold.co/100x60?text=XNHAU'">
                            <div class="side-info">
                                <p>${v.title}</p>
                                <span>👁️ ${v.views.toLocaleString()}</span>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) { console.error("Lỗi tải trending:", e); }
        }

        // --- LỌC THEO TAG ---
        function filterByTag(tag, el) {
            document.getElementById('search-input').value = ""; // Xóa text tìm kiếm
            currentPage = 1;
            localStorage.setItem('selectedTag', tag);
            localStorage.setItem('savedPage', 1);
            
            // Xóa class active của tất cả
            document.querySelectorAll('.genre-card, .cat-item').forEach(i => i.classList.remove('active'));
            document.getElementById('label-country').classList.remove('active');

            if (tag === 'all') {
                document.getElementById('btn-all-genre').classList.add('active');
                currentFilteredVideos = allVideos;
            } else {
                el.classList.add('active');
                if (countriesArr.includes(tag)) {
                    document.getElementById('label-country').classList.add('active');
                }
                currentFilteredVideos = allVideos.filter(v => v.hag_tag && v.hag_tag.includes(tag));
            }
            renderGrid();
        }

        // --- RENDER GRID ---
        function renderGrid() {
            const grid = document.getElementById('video-grid');
            const start = (currentPage - 1) * vPerPage;
            const end = start + vPerPage;
            const display = currentFilteredVideos.slice(start, end);
            
            grid.innerHTML = display.length === 0 ? `<p style="grid-column: 1/-1; text-align: center; color: #aaa; font-size: 18px; margin-top: 40px;">Không tìm thấy kết quả nào phù hợp 😢</p>` :
            display.map(v => {
                let img = v.image_vd;
                if (img && !img.includes('catbox.moe')) img = `/proxy-img?url=${encodeURIComponent(img)}`;
                return `
                    <div class="card" onclick="location.href='/video?id=${v.id_vd}'">
                        <img src="${img}" onerror="this.src='https://placehold.co/600x400?text=XNHAU'">
                        <div class="card-info"><h3>${v.title}</h3></div>
                    </div>`;
            }).join('');
            renderPagination();
        }

        function renderPagination() {
            const el = document.getElementById('pagination');
            const total = Math.ceil(currentFilteredVideos.length / vPerPage);
            if (total <= 1) { el.innerHTML = ""; return; }
            let html = "";
            for (let i = 1; i <= total; i++) {
                html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</div>`;
            }
            el.innerHTML = html;
        }

        function changePage(p) { 
            currentPage = p; 
            localStorage.setItem('savedPage', p); 
            renderGrid(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        // --- INIT ---
        async function init() {
            const genreSlider = document.getElementById('genre-slider');
            const countryList = document.getElementById('country-list');
            const savedTag = localStorage.getItem('selectedTag') || 'all';
            currentPage = parseInt(localStorage.getItem('savedPage')) || 1;

            try {
                const res = await fetch('/api/videos');
                allVideos = await res.json();
                
                const tags = new Set();
                allVideos.forEach(v => { if (v.hag_tag) v.hag_tag.forEach(t => tags.add(t)); });
                
                // Phân loại tag
                tags.forEach(tag => {
                    if (countriesArr.includes(tag)) {
                        // Nhét vào Dropdown Quốc gia
                        const tagEl = document.createElement('div');
                        tagEl.className = 'cat-item' + (tag === savedTag ? ' active' : '');
                        tagEl.innerText = tag;
                        tagEl.onclick = (e) => { e.stopPropagation(); filterByTag(tag, tagEl); };
                        countryList.appendChild(tagEl);
                    } else {
                        // Nhét vào Slider Thể Loại mới
                        const cardEl = document.createElement('div');
                        cardEl.className = 'genre-card' + (tag === savedTag ? ' active' : '');
                        cardEl.innerText = tag;
                        cardEl.onclick = () => filterByTag(tag, cardEl);
                        genreSlider.appendChild(cardEl);
                    }
                });

                // Khởi tạo hiển thị
                if (savedTag === 'all') {
                    document.getElementById('btn-all-genre').classList.add('active');
                    currentFilteredVideos = allVideos;
                } else {
                    if (countriesArr.includes(savedTag)) document.getElementById('label-country').classList.add('active');
                    currentFilteredVideos = allVideos.filter(v => v.hag_tag && v.hag_tag.includes(savedTag));
                }
                
                renderGrid();
                loadTrending();
            } catch (err) { console.error(err); }
        }

        window.onclick = e => { if (!e.target.matches('.filter-btn')) document.querySelectorAll('.tag-list').forEach(l => l.classList.remove('show')); };
        window.onload = init;
    </script>
</body>
</html>
