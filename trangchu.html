<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>XNHAU - Xem Phim Hay</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root { --bg: #0c0d12; --card: #14161f; --primary: #ff8866; --text: #f1f1f1; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; -webkit-user-drag: none; }
        
        /* Header */
        header { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 20px 40px; border-bottom: 1px solid #222; text-align: center; }
        h1 { color: var(--primary); font-size: 36px; margin: 0 0 15px 0; letter-spacing: 4px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        h1:hover { opacity: 0.8; }

        /* Navigation Bar */
        .filter-wrapper { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .filter-group { position: relative; }
        .filter-btn { background: #1c1f2b; color: #fff; padding: 8px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #333; font-weight: bold; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--primary); color: var(--primary); background: #1e2130; }

        /* Dropdown Tag List */
        .tag-list {
            display: none; position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
            background: #14161f; border: 1px solid #333; border-radius: 8px;
            padding: 15px; width: max-content; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .tag-list.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .cat-item { background: #2a2d3e; color: #aaa; font-size: 12px; padding: 5px 12px; border-radius: 15px; cursor: pointer; transition: 0.2s; border: 1px solid #444; }
        .cat-item:hover, .cat-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Video Grid (3 Columns) */
        .main-content { padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.4s; border: 1px solid #222; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(255, 136, 102, 0.2); }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #222; display: block; }
        .card-info { padding: 18px; }
        .card-info h3 { margin: 0; font-size: 16px; color: #fff; line-height: 1.5; height: 48px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 40px; padding-bottom: 50px; }
        .page-btn { background: #1c1f2b; color: #aaa; border: 1px solid #333; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .page-btn:hover { border-color: var(--primary); color: var(--primary); }
        .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .img-loading { background: linear-gradient(90deg, #14161f 25%, #1c1f2b 50%, #14161f 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>

    <script>
        /* --- ANTI-DEBUG --- */
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        // Tạm thời comment dòng debugger nếu bạn muốn tự kiểm tra lỗi F12, khi xong thì hãy mở lại
        // setInterval(() => { (function() { (function a() { try { (function b(i) { if (('' + (i / i)).length !== 1 || i % 20 === 0) { (function() {}).constructor('debugger')(); } else { debugger; } b(++i); }(0)); } catch (e) { setTimeout(a, 5000); } })() })(); }, 1000);
    </script>
</head>
<body>

    <header>
        <h1 onclick="resetHome()">XNHAU</h1>
        <div class="filter-wrapper">
            <div id="btn-all" class="filter-btn" onclick="filterByTag('all', this)">Tất cả</div>
            <div class="filter-group">
                <div id="label-genre" class="filter-btn" onclick="toggleDropdown('genre-list')">Thể loại ▼</div>
                <div class="tag-list" id="genre-list"></div>
            </div>
            <div class="filter-group">
                <div id="label-country" class="filter-btn" onclick="toggleDropdown('country-list')">Quốc gia ▼</div>
                <div class="tag-list" id="country-list"></div>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div class="grid" id="video-grid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let allVideos = []; 
        let currentFilteredVideos = [];
        let currentPage = 1;
        const vPerPage = 9;
        const countriesArr = ["Việt Nam", "Korean", "Trung Quốc", "Âu/Mỹ", "Nhật Bản"];

        function resetHome() {
            localStorage.clear();
            window.location.href = '/'; // Sửa từ trangchu.html thành /
        }

        function toggleDropdown(id) {
            document.querySelectorAll('.tag-list').forEach(l => { if(l.id !== id) l.classList.remove('show'); });
            document.getElementById(id).classList.toggle('show');
        }

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            const start = (currentPage - 1) * vPerPage;
            const end = start + vPerPage;
            const display = currentFilteredVideos.slice(start, end);
            
            grid.innerHTML = display.length === 0 ? `<p style="grid-column: 1/-1; text-align: center; color: #666;">Chưa có dữ liệu...</p>` :
            display.map(v => {
                let img = v.image_vd;
                if (img && !img.includes('catbox.moe')) {
                    // SỬA: Dùng đường dẫn tương đối /proxy-img
                    img = `/proxy-img?url=${encodeURIComponent(img)}`;
                }
                // SỬA: Chuyển hướng sang /video thay vì trangvideo.html
                return `<div class="card" onclick="location.href='/video?id=${v.id_vd}'">
                            <img src="${img}" class="img-loading" onerror="this.src='https://placehold.co/600x400?text=XNHAU'" onload="this.classList.remove('img-loading')">
                            <div class="card-info"><h3>${v.title}</h3></div>
                        </div>`;
            }).join('');
            renderPagination();
        }

        function renderPagination() {
            const el = document.getElementById('pagination');
            const total = Math.ceil(currentFilteredVideos.length / vPerPage);
            if (total <= 1) { el.innerHTML = ""; return; }
            let html = "";
            for (let i = 1; i <= total; i++) {
                html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</div>`;
            }
            el.innerHTML = html;
        }

        function changePage(p) { 
            currentPage = p; 
            localStorage.setItem('savedPage', p); 
            renderGrid(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function filterByTag(tag, el) {
            currentPage = 1;
            localStorage.setItem('selectedTag', tag);
            localStorage.setItem('savedPage', 1);

            document.querySelectorAll('.filter-btn, .cat-item').forEach(i => i.classList.remove('active'));
            if (tag === 'all') {
                document.getElementById('btn-all').classList.add('active');
                currentFilteredVideos = allVideos;
            } else {
                el.classList.add('active');
                const parent = countriesArr.includes(tag) ? 'label-country' : 'label-genre';
                document.getElementById(parent).classList.add('active');
                currentFilteredVideos = allVideos.filter(v => v.hag_tag && v.hag_tag.includes(tag));
            }
            renderGrid();
        }

        async function init() {
            const genreList = document.getElementById('genre-list');
            const countryList = document.getElementById('country-list');
            
            const savedTag = localStorage.getItem('selectedTag') || 'all';
            currentPage = parseInt(localStorage.getItem('savedPage')) || 1;

            try {
                // ĐÃ DÙNG đường dẫn tương đối /api/videos
                const res = await fetch('/api/videos');
                allVideos = await res.json();
                
                const tags = new Set();
                allVideos.forEach(v => { if (v.hag_tag) v.hag_tag.forEach(t => tags.add(t)); });

                tags.forEach(tag => {
                    const tagEl = document.createElement('div');
                    tagEl.className = 'cat-item' + (tag === savedTag ? ' active' : '');
                    tagEl.innerText = tag;
                    tagEl.onclick = (e) => { e.stopPropagation(); filterByTag(tag, tagEl); };
                    
                    if (countriesArr.includes(tag)) countryList.appendChild(tagEl);
                    else genreList.appendChild(tagEl);
                });

                if (savedTag === 'all') {
                    document.getElementById('btn-all').classList.add('active');
                    currentFilteredVideos = allVideos;
                } else {
                    const parent = countriesArr.includes(savedTag) ? 'label-country' : 'label-genre';
                    document.getElementById(parent).classList.add('active');
                    currentFilteredVideos = allVideos.filter(v => v.hag_tag && v.hag_tag.includes(savedTag));
                }
                
                renderGrid();
            } catch (err) { console.error(err); }
        }

        window.onclick = e => { if (!e.target.matches('.filter-btn')) document.querySelectorAll('.tag-list').forEach(l => l.classList.remove('show')); };
        window.onload = init;
    </script>
</body>
</html>
